<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Orçamento</h1>
    <p>Cadastre aqui os produtos que você deseja incluir no orçamento.</p>

    <button id="novoProdutoBtn" class="action-button">Novo Produto</button>

    <div id="produtoFormContainer" class="hidden">
        <form id="produtoForm">
            <div class="form-field">
                <label for="nomeProduto">Nome do Produto</label>
                <input type="text" id="nomeProduto" name="nomeProduto" required>
            </div>
            <div class="form-field">
                <label for="descricaoProduto">Descrição</label>
                <input type="text" id="descricaoProduto" name="descricaoProduto" required>
            </div>
            <div class="form-field">
                <label for="valorProduto">Valor</label>
                <input type="number" id="valorProduto" name="valorProduto" min="0" step="0.01" required>
            </div>
            <div class="form-field">
                <label for="quantidadeProduto">Quantidade</label>
                <input type="number" id="quantidadeProduto" name="quantidadeProduto" min="1" value="1" required>
            </div>
            <div class="form-actions">
                <button type="submit">Salvar Produto</button>
                <button type="button" id="cancelarProdutoBtn">Cancelar</button>
            </div>
        </form>
    </div>

    <script>
        const novoProdutoBtn = document.getElementById('novoProdutoBtn');
        const produtoFormContainer = document.getElementById('produtoFormContainer');
        const cancelarProdutoBtn = document.getElementById('cancelarProdutoBtn');
        const produtoForm = document.getElementById('produtoForm');

        novoProdutoBtn.addEventListener('click', () => {
            produtoFormContainer.classList.toggle('visible');
        });

        cancelarProdutoBtn.addEventListener('click', () => {
            produtoFormContainer.classList.remove('visible');
        });

        produtoForm.addEventListener('submit', event => {
            event.preventDefault();
            alert('Produto cadastrado no orçamento com sucesso!');
            produtoForm.reset();
            produtoFormContainer.classList.remove('visible');
        });
    </script>
</body>
</html>
