<!-- ============================================================
     FATURAMENTO MENSAL — Cole dentro do seu HTML
     ============================================================

  1. Adicione o <style> abaixo dentro do <head> (ou no seu CSS).
  2. Adicione o bloco <section id="abaFaturamento"> junto às
     outras abas do seu sistema.
  3. No seu menu de abas, adicione o botão/link correspondente
     e chame renderFaturamento() ao ativar a aba.
  4. Inclua <script src="faturamento.js"></script> antes do
     fechamento do </body>, APÓS o app.js.
============================================================ -->


<!-- ==================  CSS  ================================ -->
<style>
/* --- Variáveis de cor (adapte ao seu tema) --- */
:root {
    --fat-pago:      #3ecf8e;   /* verde: valor pago        */
    --fat-pendente:  #f6a623;   /* laranja: valor pendente  */
    --fat-linha:     #4f8ef7;   /* azul: linha de evolução  */
    --fat-grid:      #e2e8f0;   /* grade do gráfico         */
    --fat-card-bg:   #ffffff;
    --fat-card-shadow: 0 2px 12px rgba(0,0,0,.08);
    --fat-radius:    12px;
}

/* --- Seção geral --- */
#abaFaturamento {
    display: none;
    padding: 24px 0;
    animation: fatFadeIn .3s ease;
}
#abaFaturamento.active { display: block; }

@keyframes fatFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0);   }
}

/* --- Cards de destaque --- */
.fat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
}
.fat-card {
    background: var(--fat-card-bg);
    border-radius: var(--fat-radius);
    box-shadow: var(--fat-card-shadow);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.fat-card__label {
    font-size: .72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #94a3b8;
}
.fat-card__value {
    font-size: 1.35rem;
    font-weight: 700;
    color: #1e293b;
}
.fat-card__sub {
    font-size: .8rem;
    color: #64748b;
}
.fat-var-up   { color: var(--fat-pago);     font-weight: 600; font-size: .85rem; }
.fat-var-down { color: #ef4444;             font-weight: 600; font-size: .85rem; }

/* --- Gráfico --- */
.fat-grafico-wrap {
    background: var(--fat-card-bg);
    border-radius: var(--fat-radius);
    box-shadow: var(--fat-card-shadow);
    padding: 20px;
    margin-bottom: 28px;
    overflow: hidden;
}
.fat-grafico-wrap h3 {
    font-size: .85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #64748b;
    margin: 0 0 16px;
}
.fat-legenda {
    display: flex;
    gap: 20px;
    font-size: .78rem;
    color: #64748b;
    margin-top: 8px;
}
.fat-legenda span::before {
    content: '●';
    margin-right: 4px;
}
.fat-legenda .l-pago::before     { color: var(--fat-pago);     }
.fat-legenda .l-pendente::before { color: var(--fat-pendente); }
.fat-legenda .l-total::before    { color: var(--fat-linha);    }

.fat-axis-label {
    font-size: 11px;
    fill: #94a3b8;
    font-family: inherit;
}

/* --- Tabela --- */
.fat-tabela-wrap {
    background: var(--fat-card-bg);
    border-radius: var(--fat-radius);
    box-shadow: var(--fat-card-shadow);
    padding: 20px;
    overflow-x: auto;
}
.fat-tabela-wrap h3 {
    font-size: .85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #64748b;
    margin: 0 0 16px;
}
.fat-tabela-wrap table {
    width: 100%;
    border-collapse: collapse;
    font-size: .88rem;
}
.fat-tabela-wrap th {
    text-align: left;
    padding: 8px 12px;
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #94a3b8;
    border-bottom: 2px solid #f1f5f9;
}
.fat-tabela-wrap td {
    padding: 10px 12px;
    border-bottom: 1px solid #f1f5f9;
    color: #334155;
}
.fat-tabela-wrap tr:last-child td { border-bottom: none; }
.fat-tabela-wrap tr:hover td { background: #f8fafc; }

.fat-valor   { font-variant-numeric: tabular-nums; }
.fat-pago    { color: #059669; font-weight: 600; }
.fat-pendente{ color: #d97706; font-weight: 600; }

.fat-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: .75rem;
    font-weight: 700;
}
.fat-badge--up      { background: #dcfce7; color: #15803d; }
.fat-badge--down    { background: #fee2e2; color: #b91c1c; }
.fat-badge--neutral { background: #f1f5f9; color: #94a3b8; }

/* --- Totais rodapé --- */
#faturamentoTotaisRow td {
    border-top: 2px solid #e2e8f0;
    background: #f8fafc;
    font-weight: 700;
}

/* --- Estado vazio --- */
.fat-vazio {
    text-align: center;
    padding: 48px;
    color: #94a3b8;
    font-size: .9rem;
}
</style>


<!-- ==================  HTML  ================================ -->

<!-- Botão de aba — adicione junto aos outros botões de navegação -->
<button class="tab-btn" onclick="ativarAba('abaFaturamento')">
    📊 Faturamento
</button>

<!-- Conteúdo da aba -->
<section id="abaFaturamento">

    <!-- Cards de resumo -->
    <div class="fat-cards">
        <div class="fat-card">
            <span class="fat-card__label">Último mês (<span id="fatCardUltimoLabel">—</span>)</span>
            <span class="fat-card__value" id="fatCardUltimoMes">R$ 0,00</span>
            <span id="fatCardVariacao" class="fat-var-up">—</span>
        </div>
        <div class="fat-card">
            <span class="fat-card__label">Melhor mês</span>
            <span class="fat-card__value" id="fatCardMelhorValor">R$ 0,00</span>
            <span class="fat-card__sub" id="fatCardMelhorMes">—</span>
        </div>
        <div class="fat-card">
            <span class="fat-card__label">Média mensal</span>
            <span class="fat-card__value" id="fatCardMedia">R$ 0,00</span>
        </div>
        <div class="fat-card">
            <span class="fat-card__label">Total acumulado</span>
            <span class="fat-card__value" id="fatCardTotal">R$ 0,00</span>
        </div>
    </div>

    <!-- Gráfico de evolução -->
    <div class="fat-grafico-wrap">
        <h3>Evolução do Faturamento</h3>
        <div id="faturamentoGrafico"></div>
        <div class="fat-legenda">
            <span class="l-pago">Pago</span>
            <span class="l-pendente">Pendente</span>
            <span class="l-total">Total (linha)</span>
        </div>
    </div>

    <!-- Tabela comparativa -->
    <div class="fat-tabela-wrap">
        <h3>Comparativo Mensal</h3>
        <table>
            <thead>
                <tr>
                    <th>Mês</th>
                    <th>Pedidos</th>
                    <th>Total</th>
                    <th>Pago</th>
                    <th>Pendente</th>
                    <th>Variação</th>
                </tr>
            </thead>
            <tbody id="faturamentoTableBody"></tbody>
            <tfoot>
                <tr id="faturamentoTotaisRow"></tr>
            </tfoot>
        </table>
    </div>

</section>


<!-- ==================  JS de integração  =================== -->
<!--
    Se você já tem uma função de troca de abas, basta chamar
    renderFaturamento() ao ativar a aba. Exemplo:

    function ativarAba(id) {
        document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'abaFaturamento') renderFaturamento();
    }

    Inclua o faturamento.js ANTES do fechamento do </body>:
    <script src="faturamento.js"></script>
-->
