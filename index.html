<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borboleta.Papelando - Papelaria Personalizada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./imagens/borboleta.png">
    
</head>
<body>
    
    <h1>Bem-vindo à Borboleta.Papelando!</h1>
    <p>A sua papelaria personalizada para todas as ocasiões.</p>
    
    <div class="button-container">
        <button class="action-button" onclick="window.location.href='orcamento.html'">
            <img src="./imagens/icons8-orçamento-100.png" alt="Orçamento"> <br>Orçamento
        </button>
        <button class="action-button" onclick="window.location.href='pedido.html'">
            <img src="./imagens/icons8-pedido-processado-100.png" alt="Pedidos"> <br>Pedidos
        </button>
    </div>
    <footer>
        <p>Site Criado por <a href="https://www.instagram.com/rafaelbassalo/" target="_blank">Rafael Bassalo</a> para  <a href="https://www.instagram.com/borboleta.papelando/" target="_blank">Borboleta.Papelando</a></p>
    </footer>

    <button id="configBtn" class="config-btn">
    ⚙
</button>

<div id="configModal" class="config-modal hidden">

    <div class="config-content">

        <div class="config-header">

            <h2>Configurações da Empresa</h2>

            <button id="fecharConfig">
                ✕
            </button>

        </div>

        <div class="config-body">

            <label class="logo-upload-label">
             Logo da Empresa
             </label>

             <input
                 type="file"
                 id="logoEmpresa"
                 accept="image/*"
             >
             
            <input
                type="text"
                id="empresaNome"
                placeholder="Nome da empresa"
            >

            <input
                type="text"
                id="whatsappEmpresa"
                placeholder="WhatsApp"
            >

            <input
                type="text"
                id="instagramEmpresa"
                placeholder="@instagram"
            >

            <input
                type="text"
                id="chavePix"
                placeholder="Chave PIX"
            >

            <textarea
                id="pixCode"
                placeholder="PIX Copia e Cola"
            ></textarea>

            <button id="salvarConfigBtn">
                Salvar
            </button>
            

    </div>

    </div>

</div>

 <script src="script.js"></script>
</body>
</html>
