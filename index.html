<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borboleta.Papelando - Papelaria Personalizada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./imagens/borboleta.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
</head>
<body>
    
    <h1>Bem-vindo à Borboleta.Papelando!</h1>
    <p>A sua papelaria personalizada para todas as ocasiões.</p>
    <div style="margin-top: 32px;">
    <img 
        src="./imagens/logo-borboleta- SF.png" 
        alt="Borboleta Papelando"
        style="
            width: 280px;
            max-width: 85vw;
            filter: drop-shadow(0 4px 18px rgba(236,72,153,0.18));
            animation: floatLogo 3.5s ease-in-out infinite;
        "
    >
</div>
    
    
<div class="button-container">
    <button id="Orçamento" class="btn btn-rosa" onclick="window.location.href='orcamento.html'">
        <i class="ti ti-layout-dashboard" aria-hidden="true"></i>Orçamento
    </button>
    <button id="Pedidos" class="btn btn-azul" onclick="window.location.href='pedido.html'">
        <i class="ti ti-clipboard-list" aria-hidden="true"></i>Pedidos
    </button>
</div>
    
    <footer>
        <p>Site Criado por <a href="https://www.instagram.com/rafaelbassalo/" target="_blank">Rafael Bassalo</a> para  <a href="https://www.instagram.com/borboleta.papelando/" target="_blank">Borboleta.Papelando</a></p>
    </footer>

    <button id="configBtn" class="config-btn">
    ⚙
</button>

<div id="configModal" class="config-modal hidden">

    <div class="config-content">

        <div class="config-header">

            <h2>Configurações da Empresa</h2>

            <button id="fecharConfig">
                ✕
            </button>

        </div>

<div class="config-body">

    <div class="form-field">
        <label for="logoEmpresa">Logo da Empresa</label>
        <input type="file" id="logoEmpresa" accept="image/*">
    </div>

    <div class="form-field">
        <label for="empresaNome">Nome da Empresa</label>
        <input type="text" id="empresaNome" placeholder="Nome da empresa">
    </div>

    <div class="form-field">
        <label for="whatsappEmpresa">WhatsApp</label>
        <input type="text" id="whatsappEmpresa" placeholder="WhatsApp">
    </div>

    <div class="form-field">
        <label for="instagramEmpresa">Instagram</label>
        <input type="text" id="instagramEmpresa" placeholder="@instagram">
    </div>

    <div class="form-field">
        <label for="chavePix">Chave PIX</label>
        <input type="text" id="chavePix" placeholder="Chave PIX">
    </div>

    <div class="form-field">
        <label for="pixCode">PIX Copia e Cola</label>
        <textarea id="pixCode" placeholder="PIX Copia e Cola"></textarea>
    </div>

    <button id="salvarConfigBtn">Salvar</button>

</div>
    </div>

</div>

 <script src="script.js"></script>
</body>
</html>
