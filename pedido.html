<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="Voltar" class="action-button" onclick="window.location.href='index.html'">Voltar</button>
    <h1>Pedidos</h1>
    <p>Use o botão abaixo para cadastrar um novo pedido nesta página.</p>

    <button id="novoPedidoBtn" class="action-button">Novo Pedido</button>

    <div id="pedidoFormContainer" class="hidden">
        <form id="pedidoForm">
            <input type="hidden" id="editId" name="editId" value="">
            <input type="hidden" id="editOriginalMes" name="editOriginalMes" value="">
            <div class="form-field">
                <label for="cliente">Nome do Cliente</label>
                <input type="text" id="cliente" name="cliente" required>
            </div>
            <div class="form-field">
                <label for="produto">Produto</label>
                <input type="text" id="produto" name="produto" required>
            </div>
            <div class="form-field">
                <label for="valor">Valor Total</label>
                <input type="number" id="valor" name="valor" min="0" step="0.01" required>
            </div>
            <div class="form-field">
                <label for="data">Data de Entrega do Pedido</label>
                <input type="date" id="data" name="data" required>
            </div>
            <div class="form-field">
                <label for="mes">Mês do Pedido</label>
                <select id="mes" name="mes" required>
                    <option value="2026-01">Janeiro 2026</option>
                    <option value="2026-02">Fevereiro 2026</option>
                    <option value="2026-03">Março 2026</option>
                    <option value="2026-04">Abril 2026</option>
                    <option value="2026-05" selected>Maio 2026</option> 
                    <option value="2026-06">Junho 2026</option>
                    <option value="2026-07">Julho 2026</option>
                    <option value="2026-08">Agosto 2026</option>
                    <option value="2026-09">Setembro 2026</option>
                    <option value="2026-10">Outubro 2026</option>
                    <option value="2026-11">Novembro 2026</option>
                    <option value="2026-12">Dezembro 2026</option>
                </select>
            </div>
            <div class="form-field">
                <label for="status">Status</label>
                <select id="status" name="status" required>
                    <option value="pendente">Produção</option>
                    <option value="confirmado">Confeccionado</option>
                    <option value="entregue">Entregue</option>
                </select>
            </div>
            <div class="form-field">
                <label for="pagamento">Pagamento</label>
                <select id="pagamento" name="pagamento" required>
                    <option value="nao_pago">Não pago</option>
                    <option value="pago">Pago</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit">Salvar Pedido</button>
                <button type="button" id="cancelarPedidoBtn">Cancelar</button>
            </div>
        </form>
    </div>

    <div style="margin-top: 20px;">
        <label for="monthSelector">Selecionar Mês para visualizar tabela:</label>
        <select id="monthSelector">
            <option value="2026-01">Janeiro 2026</option>
            <option value="2026-02">Fevereiro 2026</option>
            <option value="2026-03">Março 2026</option>
            <option value="2026-04">Abril 2026</option>
            <option value="2026-05" selected>Maio 2026</option>
            <option value="2026-06">Junho 2026</option>
            <option value="2026-07">Julho 2026</option> 
            <option value="2026-08">Agosto 2026</option>
            <option value="2026-09">Setembro 2026</option>
            <option value="2026-10">Outubro 2026</option>
            <option value="2026-11">Novembro 2026</option>
            <option value="2026-12">Dezembro 2026</option>


        </select>
    </div>

    <table id="pedidosTable">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Produto</th>
                <th>Valor</th>
                <th>Data Entrega</th>
                <th>Status</th>
                <th>Pago</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="pedidosTableBody">
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2"><strong>Total do mês</strong></td>
                <td id="pedidosTotalValor"><strong>R$ 0,00</strong></td>
                <td colspan="4"></td>
            </tr>
        </tfoot>
    </table>

    <section style="margin-top: 32px;">
        <h2>Resumo por cliente</h2>
        <table id="resumoClientesTable">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Total Pedidos</th>
                    <th>Total Pago</th>
                    <th>Total Devido</th>
                </tr>
            </thead>
            <tbody id="resumoClientesTableBody"></tbody>
            <tfoot>
                <tr>
                    <td><strong>Total geral</strong></td>
                    <td id="resumoTotalPedidos">R$ 0,00</td>
                    <td id="resumoTotalPago">R$ 0,00</td>
                    <td id="resumoTotalDevido">R$ 0,00</td>
                </tr>
            </tfoot>
        </table>
    </section>

    <script src="script.js"></script>   
</body>

</html>
